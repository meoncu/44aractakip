<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="car_grad" x1="128" y1="320" x2="448" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <rect width="512" height="512" rx="100" fill="url(#bg_grad)"/>
  
  <!-- Stylized Track Lines -->
  <path d="M100 420H412" stroke="#334155" stroke-width="4" stroke-dasharray="20 20"/>
  
  <!-- Car Silhouette -->
  <g filter="url(#glow)">
    <path d="M120 310C120 285 140 265 165 260L215 175C225 160 240 150 260 150H320C340 150 355 160 365 175L415 260C440 265 460 285 460 310V365C460 380 448 392 433 392H147C132 392 120 380 120 365V310Z" fill="url(#car_grad)"/>
    
    <!-- Windows -->
    <path d="M230 185H305C320 185 330 195 335 205L360 250H205L230 205C235 195 245 185 260 185Z" fill="#0F172A" fill-opacity="0.6"/>
    
    <!-- Headlights -->
    <rect x="135" y="320" width="40" height="15" rx="7.5" fill="white" fill-opacity="0.9"/>
    <rect x="405" y="320" width="40" height="15" rx="7.5" fill="white" fill-opacity="0.9"/>
    
    <!-- Wheels -->
    <circle cx="185" cy="392" r="35" fill="#0F172A" stroke="#3B82F6" stroke-width="6"/>
    <circle cx="395" cy="392" r="35" fill="#0F172A" stroke="#3B82F6" stroke-width="6"/>
  </g>
  
  <!-- Location Pin (Symbolizing Tracking) -->
  <path d="M290 80C290 63.4315 276.569 50 260 50C243.431 50 230 63.4315 230 80C230 105 260 135 260 135C260 135 290 105 290 80Z" fill="#EF4444" />
  <circle cx="260" cy="80" r="8" fill="white"/>
</svg>
